org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental compilation is disabled because PUB_CACHE (C:\) and the
# project (D:\) are on different Windows drives. The Kotlin incremental cache
# uses relative paths between plugin sources and the project root; when they
# are on different drives the relativisation throws IllegalArgumentException
# and corrupts the cache, causing every subsequent build to fail.
kotlin.incremental=false
