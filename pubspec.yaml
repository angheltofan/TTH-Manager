name: tth_manager_app
description: "TTH Manager — Tales & Tech HUB management app for the learning centre."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  supabase_flutter: ^2.9.0
  flutter_riverpod: ^2.6.0
  go_router: ^14.7.0
  url_launcher: ^6.3.0
  pdf: ^3.11.1
  printing: ^5.13.4
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: assets/branding/tth_logo.png
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/tth_logo.png
  web:
    generate: true
    image_path: assets/branding/tth_logo.png
    background_color: "#028FE3"
    theme_color: "#028FE3"
  windows:
    generate: true
    # Windows-specific variant: white rounded-square background with the
    # TTH logo centred and padded. The transparent logo looked invisible
    # against light Windows wallpapers; this version stays legible at
    # 16/24/32/48/256-px icon caches that Windows + Inno Setup use for
    # the executable, installer, desktop shortcut and Start Menu tile.
    image_path: assets/branding/tth_icon_windows.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/tth_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/branding/
